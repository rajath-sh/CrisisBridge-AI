<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Broadcast & Map Demo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f172a; color: white; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid; }
        .high { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; }
        .normal { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; color: #3b82f6; }
        .map-card { background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 10px; }
        img { max-width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Hotel Broadcast & Maps</h1>
    
    <div id="alerts"></div>

    <h2>Hotel Maps</h2>
    <div id="maps"></div>

    <script>
        const alertsDiv = document.getElementById('alerts');
        const mapsDiv = document.getElementById('maps');

        // WebSocket for real-time broadcasts
        const ws = new WebSocket('ws://localhost:8003/ws/broadcast');
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const alertEl = document.createElement('div');
            alertEl.className = `alert ${data.priority}`;
            alertEl.innerHTML = `<strong>BROADCAST:</strong> ${data.message} <small>${new Date(data.created_at).toLocaleTimeString()}</small>`;
            alertsDiv.prepend(alertEl);
        };

        // Fetch existing maps
        fetch('http://localhost:8003/maps')
            .then(res => res.json())
            .then(maps => {
                maps.forEach(map => {
                    const el = document.createElement('div');
                    el.className = 'map-card';
                    el.innerHTML = `<h3>Floor ${map.floor_number}</h3><p>${map.description}</p>`;
                    mapsDiv.appendChild(el);
                });
            });
    </script>
</body>
</html>
